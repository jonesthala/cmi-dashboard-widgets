<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMI Wetter Mini</title>

<style>
:root {
  --cmi-blue: #009DDB;
  --cmi-dark: #0077A6;
}

html, body {
  margin: 0;
  height: 100%;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, var(--cmi-blue), var(--cmi-dark));
  color: white;
}

/* 🔥 perfekt zentrieren */
.widget {
  height: 100%;
  display: flex;
  align-items: center;      /* vertikal */
  justify-content: center;  /* horizontal */
}

/* Inhalt */
.card {
  text-align: center;
}

/* Text */
.city {
  font-size: 14px;
  opacity: 0.9;
}

.temp {
  font-size: 36px;
  font-weight: bold;
  margin: 4px 0;
}

.desc {
  font-size: 14px;
}
</style>
</head>

<body>

<div class="widget">
  <div class="card">
    <div class="city">Zürich</div>
    <div class="temp" id="temp">--°C</div>
    <div class="desc" id="desc">Lädt...</div>
  </div>
</div>

<script>
function weatherCodeToText(code) {
  const map = {
    0: "Klar",
    1: "Sonnig",
    2: "Teilweise bewölkt",
    3: "Bewölkt",
    45: "Neblig",
    61: "Regen",
    71: "Schnee",
    80: "Regenschauer",
    95: "Gewitter"
  };
  return map[code] || "Unbekannt";
}

async function loadWeather() {
  try {
    const url = "https://api.open-meteo.com/v1/forecast?latitude=47.3769&longitude=8.5417&current=temperature_2m,weather_code&timezone=auto";
    const response = await fetch(url);
    const data = await response.json();

    const temp = Math.round(data.current.temperature_2m);
    const desc = weatherCodeToText(data.current.weather_code);

    document.getElementById("temp").textContent = temp + "°C";
    document.getElementById("desc").textContent = desc;
  } catch (e) {
    document.getElementById("desc").textContent = "Fehler";
  }
}

loadWeather();
</script>

</body>
</html>
