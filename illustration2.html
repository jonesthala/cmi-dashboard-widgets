<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMI Illustration Widget</title>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden; /* kein Scrollen */
  background: #2596be;
}

.widget {
  width: 100%;
  height: 100%; /* 🔥 statt 100vh */
  background-image: url("cmi-illustration2.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}
</style>
</head>

<body>
  <div class="widget"></div>
</body>
</html>
