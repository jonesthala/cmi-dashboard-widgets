<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMI Wetter Widget</title>

<style>
:root {
  --cmi-blue: #009DDB;
  --cmi-dark: #0077A6;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, var(--cmi-blue), var(--cmi-dark));
  color: white;
}

/* Container */
.wrapper {
  padding: 20px;
  text-align: center;
}

/* Wetter Karte */
.card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(8px);
  border-radius: 20px;
  padding: 20px;
  max-width: 400px;
  margin: 0 auto;
}

.greeting {
  font-size: 24px;
  margin-bottom: 5px;
}

.city {
  font-size: 16px;
  opacity: 0.9;
}

.temp {
  font-size: 48px;
  font-weight: bold;
  margin: 10px 0;
}

.desc {
  font-size: 16px;
}

/* Illustration */
.illustration {
  width: 100%;
  max-height: 100px;
  object-fit: cover;
  margin-top: 15px;
  border-top: 2px solid rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="card">
    <div class="greeting" id="greeting">Guten Tag 👋</div>
    <div class="city">Zürich</div>
    <div class="temp">14°C</div>
    <div class="desc">Leicht bewölkt</div>
  </div>

  <!-- Illustration direkt darunter -->
  <img class="illustration" src="cmi-illustration.jpg" alt="CMI Illustration">
</div>

<script>
function updateGreeting() {
  const hour = new Date().getHours();
  let greeting = "Guten Tag 👋";

  if (hour < 12) greeting = "Guten Morgen 👋";
  else if (hour >= 18) greeting = "Guten Abend 👋";

  document.getElementById("greeting").textContent = greeting;
}

updateGreeting();
</script>

</body>
</html>
